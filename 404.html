<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>পাওয়া যায়নি — চৌধুরী ডেন্টাল</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@300;400;600;700;900&family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep:   #0b2e2b;
      --primary:#1a4d4a;
      --mid:    #246360;
      --light:  #e6f3f2;
      --soft:   #c8e8e5;
      --gold:   #c9943a;
      --gold-l: #e8b86a;
      --gold-g: #fef6e4;
      --white:  #ffffff;
      --offwhite:#f7faf9;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--deep);
      font-family: 'Hind Siliguri', 'Noto Serif Bengali', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* ── BACKGROUND LAYERS ── */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 20%, rgba(26,77,74,.55) 0%, transparent 65%),
        radial-gradient(ellipse 60% 70% at 85% 80%, rgba(201,148,58,.12) 0%, transparent 60%),
        radial-gradient(ellipse 100% 80% at 50% 110%, rgba(11,46,43,.9) 0%, transparent 50%);
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0; opacity: .06;
      background-image:
        linear-gradient(rgba(255,255,255,.6) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.6) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* floating orbs */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0; animation: drift 14s ease-in-out infinite alternate;
    }
    .orb1 { width:340px;height:340px;top:-80px;left:-100px;background:rgba(26,77,74,.55); animation-duration:17s; }
    .orb2 { width:260px;height:260px;bottom:-60px;right:-80px;background:rgba(201,148,58,.18); animation-duration:13s;animation-delay:-5s; }
    .orb3 { width:200px;height:200px;top:50%;left:60%;background:rgba(36,99,96,.4); animation-duration:20s;animation-delay:-9s; }

    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px,40px) scale(1.12); }
    }

    /* ── WRAPPER ── */
    .card {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
      padding: clamp(36px,6vw,64px) clamp(28px,7vw,72px);
      max-width: 600px; width: 92%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 36px;
      backdrop-filter: blur(22px);
      box-shadow: 0 40px 100px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
      animation: cardIn .8s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(40px) scale(.96); }
      to   { opacity:1; transform: translateY(0)   scale(1); }
    }

    /* ── CLINIC BADGE ── */
    .badge {
      display: inline-flex; align-items: center; gap: 9px;
      background: rgba(201,148,58,.13);
      border: 1px solid rgba(201,148,58,.35);
      border-radius: 50px;
      padding: 7px 20px;
      margin-bottom: 30px;
      animation: fadeSlide .6s .1s both;
    }
    .badge-dot { width:8px;height:8px;border-radius:50%;background:var(--gold);animation:blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .badge span { font-size:.82rem; font-weight:600; color:var(--gold-l); letter-spacing:.04em; }

    /* ── 404 GIANT ── */
    .num-wrap {
      position: relative; margin-bottom: 8px;
      animation: fadeSlide .65s .15s both;
    }
    .num {
      font-family: 'Noto Serif Bengali', serif;
      font-size: clamp(6rem,22vw,9.5rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(145deg, var(--white) 0%, rgba(255,255,255,.45) 60%, rgba(201,148,58,.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 6px 28px rgba(201,148,58,.25));
      letter-spacing: -4px;
    }
    .num-shadow {
      position: absolute; inset: 0;
      font-family: 'Noto Serif Bengali', serif;
      font-size: clamp(6rem,22vw,9.5rem);
      font-weight: 900;
      line-height: 1;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,.06);
      letter-spacing: -4px;
      transform: translate(3px,5px);
      z-index: -1;
    }

    /* ── TOOTH ICON ── */
    .tooth-wrap {
      position: relative; margin: 4px 0 22px;
      animation: fadeSlide .65s .2s both;
    }
    .tooth-svg {
      width: 68px; height: 68px;
      filter: drop-shadow(0 4px 16px rgba(201,148,58,.4));
      animation: toothBob 3.5s ease-in-out infinite;
    }
    @keyframes toothBob {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-8px) rotate(3deg); }
    }
    .tooth-ring {
      position: absolute; inset: -12px;
      border-radius: 50%;
      border: 1.5px dashed rgba(201,148,58,.35);
      animation: spin 18s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HEADLINE ── */
    .headline {
      font-family: 'Noto Serif Bengali', serif;
      font-size: clamp(1.5rem,4vw,2.1rem);
      font-weight: 700;
      color: var(--white);
      margin-bottom: 14px;
      line-height: 1.3;
      animation: fadeSlide .65s .25s both;
    }
    .headline span { color: var(--gold-l); }

    /* ── SUBTEXT ── */
    .sub {
      font-size: clamp(.88rem,2.5vw,1rem);
      font-weight: 400;
      color: rgba(255,255,255,.52);
      line-height: 1.7;
      margin-bottom: 38px;
      max-width: 390px;
      animation: fadeSlide .65s .32s both;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,148,58,.4), transparent);
      margin-bottom: 38px;
      animation: fadeSlide .65s .35s both;
    }

    /* ── BUTTONS ── */
    .btns {
      display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
      animation: fadeSlide .65s .42s both;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 14px 28px; border-radius: 50px;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: all .28s cubic-bezier(.22,1,.36,1);
      text-decoration: none; border: none;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,.1);
      opacity: 0; transition: opacity .2s;
    }
    .btn:hover::after { opacity: 1; }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #a5761e);
      color: #fff;
      box-shadow: 0 8px 28px rgba(201,148,58,.38);
    }
    .btn-primary:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 36px rgba(201,148,58,.5);
    }
    .btn-primary:active { transform: scale(.97); }

    .btn-ghost {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.8);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,.12);
      transform: translateY(-3px);
      border-color: rgba(255,255,255,.28);
      color: #fff;
    }
    .btn-ghost:active { transform: scale(.97); }

    .btn svg { width:18px;height:18px;flex-shrink:0; }

    /* ── BOTTOM HINT ── */
    .hint {
      margin-top: 32px;
      font-size: .76rem;
      color: rgba(255,255,255,.22);
      letter-spacing: .04em;
      animation: fadeSlide .65s .5s both;
    }
    .hint a { color:rgba(201,148,58,.55); text-decoration:none; transition:color .2s; }
    .hint a:hover { color:var(--gold-l); }

    @keyframes fadeSlide {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── BOTTOM CORNER DECO ── */
    .deco-line {
      position: fixed; pointer-events: none; z-index: 0;
    }
    .deco-tl {
      top:0;left:0;
      width:280px;height:280px;
      border-right:1px solid rgba(255,255,255,.04);
      border-bottom:1px solid rgba(255,255,255,.04);
      border-radius:0 0 50% 0;
    }
    .deco-br {
      bottom:0;right:0;
      width:220px;height:220px;
      border-left:1px solid rgba(201,148,58,.08);
      border-top:1px solid rgba(201,148,58,.08);
      border-radius:50% 0 0 0;
    }

    @media(max-width:480px){
      .btns { flex-direction:column; align-items:stretch; }
      .btn { justify-content:center; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="deco-line deco-tl"></div>
  <div class="deco-line deco-br"></div>

  <!-- Card -->
  <div class="card">

    <!-- Badge -->
    <div class="badge">
      <span class="badge-dot"></span>
      <span>চৌধুরী ডেন্টাল</span>
    </div>

    <!-- 404 -->
    <div class="num-wrap">
      <div class="num">404</div>
      <div class="num-shadow" aria-hidden="true">404</div>
    </div>

    <!-- Tooth -->
    <div class="tooth-wrap">
      <div class="tooth-ring"></div>
      <svg class="tooth-svg" viewBox="0 0 80 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="tg" x1="0" y1="0" x2="80" y2="90" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#e8c87a"/>
            <stop offset="100%" stop-color="#c9943a"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- tooth shape -->
        <path d="M40 4 C24 4 12 14 10 26 C8 38 10 46 14 56 C17 64 20 74 24 82 C26 87 30 88 33 85 C36 82 37 74 40 74 C43 74 44 82 47 85 C50 88 54 87 56 82 C60 74 63 64 66 56 C70 46 72 38 70 26 C68 14 56 4 40 4Z" fill="url(#tg)" filter="url(#glow)" opacity=".95"/>
        <!-- shine -->
        <path d="M28 12 C24 16 22 22 22 28 C22 32 24 34 27 33 C30 32 30 26 32 22 C34 18 36 14 36 10 C34 9 30 10 28 12Z" fill="rgba(255,255,255,.35)"/>
        <!-- roots hint -->
        <path d="M34 72 C33 78 32 84 32 86" stroke="rgba(180,120,30,.4)" stroke-width="2" stroke-linecap="round"/>
        <path d="M46 72 C47 78 48 84 48 86" stroke="rgba(180,120,30,.4)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Text -->
    <h1 class="headline">পৃষ্ঠাটি <span>পাওয়া যায়নি</span></h1>
    <p class="sub">আপনি যে পৃষ্ঠাটি খুঁজছেন সেটি সরিয়ে ফেলা হয়েছে, নাম পরিবর্তন করা হয়েছে অথবা কখনোই ছিল না। দাঁতের মতোই — একবার হারালে খুঁজে পাওয়া কঠিন!</p>

    <div class="divider"></div>

    <!-- Buttons -->
    <div class="btns">
      <a href="index.html" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/>
        </svg>
        হোম পেজে যান
      </a>
      

    <p class="hint">সমস্যা হলে যোগাযোগ করুন &nbsp;·&nbsp; <a href="https://chowdhurydental.com.bd/">chowdhurydental.com.bd</a></p>

  </div>

</body>
</html>
